services:
  # ==========================================
  # Python FastAPI 後端 (uv + SQLite)
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: defense-bot-backend
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      # 資料持久化：SQLite DB + CSV 種子資料
      - ./data:/app/data
      # PPT 模板
      - ./templates:/app/templates
      # PPT 檔案持久化（bind mount，直接對應 host 目錄，方便備份與查看）
      - ./backend/downloads:/app/backend/downloads
    env_file:
      - .env

# volumes:  # backend-downloads named volume 已改為 bind mount